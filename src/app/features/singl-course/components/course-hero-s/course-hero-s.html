<section class="overflow-hidden relative">
  <!-- ================= Hero ================= -->
  <div
    class="py-16 bg-[url('/imgs/newPattern.png')] px-6 bg-primary overflow-x-hidden bg-center bg-repeat lg:py-24"
  >
    <div class="mx-auto px-10 grid grid-cols-1 lg:grid-cols-2 gap-10 items-center">
      <!-- Left -->
      <div class="text-center px-5 lg:text-left">
        <h1 class="text-[20px] md:text-5xl xl:text-[50px] font-bold text-white leading-tight">
          Tajweed Course
        </h1>

        <p
          class="mt-6 text-lg md:text-[30px] font-normal w-full leading-[18px] md:leading-[45px] text-white/90 max-w-xl mx-auto lg:mx-0"
        >
          Learn to recite the Quran correctly
          <span class="hidden md:block">with proper Tajweed rules</span>
        </p>

        <button
          class="mt-10 rounded-[21.21px_7.07px] bg-white md:px-12 md:py-4 px-6 py-2 font-semibold text-secondary transition hover:scale-105"
        >
          Get Free Trial
        </button>
      </div>

      <!-- Right -->
    </div>
  </div>

  <div
    class="flex justify-center mx-auto w-full pt-4 md:pt-30 top-55 items-center absolute lg:top-5 lg:right-9 w-[447px] lg:mt-0 lg:justify-end"
  >
    <div class="w-[70%] lg:w-[40%] rounded-[45px_10px] bg-white p-6 md:p-8 shadow-2xl">
      <h2 class="text-center md:text-3xl text-2xl font-bold text-primary">Request a Course</h2>

      <p class="mt-2 text-center text-sm text-primary font-semibold text-[15px]">
        Free Trial Class — No Payment Required
      </p>

      <div class="px-3 py-[17.5px]">
        <div>
          <label for="course" class="mb-2 block text-xl w-full font-normal text-black">
            Select a course
          </label>

          <select
            id="course"
            class="h-[42px] w-full rounded-xl border border-mint border-[3px] bg-white px-4 text-sm text-gray-500 outline-none transition focus:border-[#0A5B45]"
          >
            <option selected disabled>Choose a course</option>
          </select>
        </div>

        <!-- Name -->
        <div>
          <label for="name" class="mb-2 block text-xl w-full font-normal text-black"> Name </label>

          <input
            id="name"
            type="text"
            placeholder="Your name"
            class="h-[42px] w-full rounded-xl border border-mint border-[3px] bg-white px-4 text-sm text-gray-500 outline-none transition focus:border-[#0A5B45]"
          />
        </div>

        <!-- Gender -->
        <div>
          <label for="gender" class="mb-2 block text-xl w-full font-normal text-black">
            Gender
          </label>

          <select
            id="gender"
            class="h-[42px] w-full rounded-xl border border-mint border-[3px] bg-white px-4 text-sm text-gray-500 outline-none transition focus:border-[#0A5B45]"
          >
            <option selected disabled>Choose the gender</option>
            <option>Male</option>
            <option>Female</option>
          </select>
        </div>

        <!-- Age -->
        <div>
          <label for="age" class="mb-2 block text-xl w-full font-normal text-black"> Age </label>

          <input
            id="age"
            type="number"
            placeholder="Your age"
            class="h-[42px] w-full rounded-xl border border-mint border-[3px] bg-white px-4 text-sm text-gray-500 outline-none transition focus:border-[#0A5B45]"
          />
        </div>

        <!-- Email -->
        <div>
          <label for="email" class="mb-2 block text-xl w-full font-normal text-black">
            Email address
          </label>

          <input
            id="email"
            type="email"
            placeholder="Your.Email@example.com"
            class="h-[42px] w-full rounded-xl border border-mint border-[3px] bg-white px-4 text-sm text-gray-500 outline-none transition focus:border-[#0A5B45]"
          />
        </div>

        <!-- Country -->
        <div>
          <label for="country" class="mb-2 block text-xl w-full font-normal text-black">
            Country
          </label>

          <div class="relative">
            <span class="absolute left-4 top-1/2 -translate-y-1/2"> 🌍 </span>

            <select
              id="country"
              class="h-13 w-full rounded-xl border border-[#CFEAE3] bg-white pl-12 pr-4 text-sm text-gray-500 outline-none focus:border-[#0A5B45]"
            >
              <option selected disabled>Your country</option>
            </select>
          </div>
        </div>

        <!-- WhatsApp -->
        <div>
          <label for="whatsapp" class="mb-2 block text-xl w-full font-normal text-black">
            WhatsApp
          </label>

          <input
            id="whatsapp"
            type="tel"
            placeholder="+1 (555) 123-4567"
            class="h-[42px] w-full rounded-xl border border-mint border-[3px] bg-white px-4 text-sm text-gray-500 outline-none transition focus:border-[#0A5B45]"
          />
        </div>

        <!-- Button -->
        <button
          type="submit"
          class="mt-4 h-14 w-full bg-secondary rounded-[21.21px_7.07px] text-lg font-semibold text-white transition hover:bg-[#46AF47]"
        >
          Get Free Trial
        </button>
      </div>
    </div>
  </div>

        </div>
      </div>

      <!-- Video -->

      <div class="mt-5">
        <div
          class="relative aspect-video overflow-hidden rounded-[28px] border-[6px] border-[#AF8E45] bg-[#E8F3EF]"
        >
          <!-- الفيديو أو الصورة -->
          <img src="/imgs/video-placeholder.png" class="h-full w-full object-cover" alt="" />

          <!-- Play -->

          <button
            class="absolute left-1/2 top-1/2 flex h-20 w-20 -translate-x-1/2 -translate-y-1/2 items-center justify-center rounded-full bg-white text-3xl shadow-xl"
          >
            ▶
          </button>
        </div>
      </div>
    </div>
  </section>
</section>
