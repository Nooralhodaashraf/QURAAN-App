      <p class="mt-6 text-black font-normal text-[14px] md:text-[20px]">
        How we guide our students to learn the Quran with excellence and love.
      </p>
      <div
        class="w-full mx-auto overflow-visible md:hidden md:grid-cols-2 lg:grid-cols-3 md:gap-15 h-70.75"
      >
        <!--! w-[271px] غيرته لانه بيبوظ المقاسات عن اللي موجود ف الديزاين -->
        <swiper-container
          class="mySwiper w-full overflow-visible"
          slides-per-view="auto"
          autoplay="true"
        >
          @for (card of philosophyCards; track card.title) {
            <swiper-slide class="px-2 py-3.5 overflow-visible">
              <div
                class="py-1.25 px-px w-full h-[283px] overflow-visible rounded-tl-[50px] rounded-br-[50px] rounded-tr-xl rounded-bl-xl bg-linear-to-b from-yellow-600 via-emerald-700 to-emerald-900 hover:scale-105 transition duration-300"
              >
                <div
                  class="bg-white h-full w-full rounded-tl-[48px] pt-7 px-0 rounded-br-[48px] rounded-tr-lg rounded-bl-lg text-center flex flex-col items-center"
                >
                  <!-- Title -->
                  <div class="pt-7 px-2">
                    <!-- !pt-[78px] دا رقم مبوظ الشكل كله ومطلع الكلام برا الدفاية -->
                    <h3 class="font-medium text-[20px] text-black mb-4 leading-7.5">
                      {{ card.title }}
                    </h3>

                    <!-- Description -->
                    <p class="text-[14px] text-black leading-7.5">
                      {{ card.description }}
                    </p>
                  </div>
                </div>
              </div></swiper-slide
            >
          }
        </swiper-container>
      </div>
    </div>

    <!-- Cards -->

    <div
      class="w-full mx-auto overflow-visible hidden md:grid md:grid-cols-2 lg:grid-cols-3 md:gap-15 h-70.75"
    >
      @for (card of philosophyCards; track card.title) {
        <div
          class="py-1.25 px-px rounded-tl-[50px] rounded-br-[50px] rounded-tr-xl rounded-bl-xl bg-linear-to-b from-yellow-600 via-emerald-700 to-emerald-900 hover:scale-105 transition duration-300"
        >
          <div
            class="bg-white h-full w-full rounded-tl-[48px] rounded-br-[48px] rounded-tr-lg rounded-bl-lg p-8 text-center flex flex-col items-center"
          >
            <!-- Title -->
            <div class="w-70 px-3">
              <h3 class="font-medium text-xl text-black mb-4 leading-7.5">
                {{ card.title }}
              </h3>

              <!-- Description -->
              <p class="text-[14px] text-black leading-7.5">
                {{ card.description }}
              </p>
            </div>
          </div>
        </div>
      }
    </div>
  </div>
</section>
